versions:
  # Cascara modules
  cascara-common: "0.1.2"
  cascara-lang-css: "0.1.0"
  cascara-lang-json: "0.1.0"
  cascara-lang-jsonpath: "0.1.0"
  cascara-lang-markdown: "0.1.0"
  cascara-lang-xml: "0.1.0"
  cascara-lang-yaml: "0.1.1"
  cascara-macos-files: "1.1.0"
  cascara-schema: "0.1.1"

  # External libraries
  junit: "5.13.4"
  mockito: "5.18.0"

libraries:
  # Cascara modules
  cascara-common:
    group: "io.cascara"
    name: "cascara-common"
    version: "${versions.cascara-common}"

  cascara-lang-css:
    group: "io.cascara"
    name: "cascara-lang-css"
    version: "${versions.cascara-lang-css}"

  cascara-lang-json:
    group: "io.cascara"
    name: "cascara-lang-json"
    version: "${versions.cascara-lang-json}"

  cascara-lang-jsonpath:
    group: "io.cascara"
    name: "cascara-lang-jsonpath"
    version: "${versions.cascara-lang-jsonpath}"

  cascara-lang-markdown:
    group: "io.cascara"
    name: "cascara-lang-markdown"
    version: "${versions.cascara-lang-markdown}"

  cascara-lang-xml:
    group: "io.cascara"
    name: "cascara-lang-xml"
    version: "${versions.cascara-lang-xml}"

  cascara-lang-yaml:
    group: "io.cascara"
    name: "cascara-lang-yaml"
    version: "${versions.cascara-lang-yaml}"

  cascara-macos-files:
    group: "io.cascara"
    name: "cascara-macos-files"
    version: "${versions.cascara-macos-files}"

  cascara-schema:
    group: "io.cascara"
    name: "cascara-schema"
    version: "${versions.cascara-schema}"

  # External libraries
  junit-bom:
    group: "org.junit"
    name: "junit-bom"
    version: "${versions.junit}"

  junit-api:
    group: "org.junit.jupiter"
    name: "junit-jupiter-api"
    version: "${versions.junit}"

  junit-engine:
    group: "org.junit.jupiter"
    name: "junit-jupiter-engine"
    version: "${versions.junit}"

  mockito-core:
    group: "org.mockito"
    name: "mockito-core"
    version: "${versions.mockito}"

  mockito-junit:
    group: "org.mockito"
    name: "mockito-junit-jupiter"
    version: "${versions.mockito}"
